name: Postar produtos no Telegram

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "indicacoes/**/*.html"
      - "assets/img/indicacoes/**"
      - "scripts/postar-produtos-telegram.py"
      - ".github/workflows/postar-produtos-telegram.yml"

permissions:
  contents: write

concurrency:
  group: postar-produtos-telegram
  cancel-in-progress: false

jobs:
  postar-produtos:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Publicar produtos novos
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EAT_SITE_URL: https://encontreaquitech.com
        run: python scripts/postar-produtos-telegram.py

      - name: Salvar historico de publicacoes
        run: |
          if git diff --quiet -- .github/telegram-products-state.json; then
            echo "Historico do Telegram sem alteracoes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/telegram-products-state.json
          git commit -m "Atualiza historico de posts do Telegram"
          git push
