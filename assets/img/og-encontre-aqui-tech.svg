<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Encontre Aqui Tech</title>
  <desc id="desc">Capa de compartilhamento do Encontre Aqui Tech com paleta escura, creme, bronze e azul.</desc>
  <defs>
    <linearGradient id="heroShade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#100d0b"/>
      <stop offset="0.58" stop-color="#100d0b" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#100d0b" stop-opacity="0.56"/>
    </linearGradient>
    <linearGradient id="blueBeam" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#257da7" stop-opacity="0.42"/>
      <stop offset="0.5" stop-color="#257da7" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#c29f73" stop-opacity="0.12"/>
    </linearGradient>
    <radialGradient id="blueGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#257da7" stop-opacity="0.34"/>
      <stop offset="0.52" stop-color="#257da7" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#257da7" stop-opacity="0"/>
    </radialGradient>
    <filter id="astroGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="9" flood-color="#faebd1" flood-opacity="0.26"/>
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <filter id="softLift" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <clipPath id="frameClip">
      <rect x="54" y="44" width="1092" height="542" rx="8"/>
    </clipPath>
  </defs>

  <rect width="1200" height="630" fill="#100d0b"/>

  <g opacity="0.72">
