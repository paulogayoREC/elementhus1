    <path d="M737 92H1146V586H846C792 512 761 425 753 326C747 242 742 164 737 92Z" fill="#000000" opacity="0.22"/>
    <path d="M760 514C862 462 998 444 1136 472L1146 586H724C728 552 740 530 760 514Z" fill="#100d0b" opacity="0.86"/>
    <path d="M750 518C854 468 990 450 1130 475" fill="none" stroke="#257da7" stroke-width="2" stroke-opacity="0.44"/>
    <image href="astro001-cutout.png" x="757" y="78" width="424" height="424" opacity="0.96" filter="url(#astroGlow)"/>
