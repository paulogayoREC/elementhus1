    <path d="M0 86H1200M0 170H1200M0 254H1200M0 338H1200M0 422H1200M0 506H1200M0 590H1200" stroke="#faebd1" stroke-width="1" opacity="0.08"/>
    <path d="M80 0V630M164 0V630M248 0V630M332 0V630M416 0V630M500 0V630M584 0V630M668 0V630M752 0V630M836 0V630M920 0V630M1004 0V630M1088 0V630" stroke="#faebd1" stroke-width="1" opacity="0.08"/>
    <circle cx="264" cy="118" r="2" fill="#257da7" opacity="0.42"/>
    <circle cx="466" cy="206" r="2" fill="#c29f73" opacity="0.36"/>
    <circle cx="716" cy="76" r="2" fill="#257da7" opacity="0.42"/>
    <circle cx="936" cy="252" r="2" fill="#c29f73" opacity="0.38"/>
    <circle cx="182" cy="430" r="2" fill="#faebd1" opacity="0.28"/>
    <circle cx="628" cy="492" r="2" fill="#257da7" opacity="0.36"/>
  </g>

  <rect x="54" y="44" width="1092" height="542" rx="8" fill="none" stroke="#faebd1" stroke-opacity="0.18"/>
  <rect x="55" y="45" width="1090" height="540" rx="8" fill="url(#blueBeam)" opacity="0.42"/>

  <g clip-path="url(#frameClip)">
